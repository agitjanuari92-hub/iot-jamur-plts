<!DOCTYPE html>
<html>
<head>
  <title>Monitoring Jamur & PLTS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      margin: 10px;
      border-radius: 15px;
      display: inline-block;
      width: 200px;
    }
    button {
      padding: 15px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    .on { background: green; color: white; }
    .off { background: red; color: white; }

    canvas {
      max-width: 90%;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>🌱 Monitoring Jamur & PLTS</h1>

<div class="card">
  <h3>Suhu</h3>
  <h2 id="suhu">-- °C</h2>
</div>

<div class="card">
  <h3>Kelembapan</h3>
  <h2 id="hum">-- %</h2>
</div>

<div class="card">
  <h3>Tegangan PLTS</h3>
  <h2 id="volt">-- V</h2>
</div>

<br>

<button class="on" onclick="pompaON()">Pompa ON</button>
<button class="off" onclick="pompaOFF()">Pompa OFF</button>

<!-- ✅ GRAFIK -->
<canvas id="myChart"></canvas>

<script>
  // 🔥 CONFIG FIREBASE (SUDAH BENAR)
  var firebaseConfig = {
    apiKey: "AIzaSyC8ixplzCptbSTNfyprSlPvaVycSRgvybM",
    authDomain: "web-jamur-pintar.firebaseapp.com",
    databaseURL: "https://web-jamur-pintar-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "web-jamur-pintar",
  };

  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();

  // =========================
  // 📊 SETUP GRAFIK
  // =========================
  var suhuData = [];
  var humData = [];
  var voltData = [];
  var labels = [];

  var ctx = document.getElementById('myChart').getContext('2d');

  var chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Suhu (°C)',
          data: suhuData,
          borderColor: 'red',
          borderWidth: 2
        },
        {
          label: 'Kelembapan (%)',
          data: humData,
          borderColor: 'blue',
          borderWidth: 2
        },
        {
          label: 'Tegangan (V)',
          data: voltData,
          borderColor: 'yellow',
          borderWidth: 2
        }
      ]
    },
    options: {
      responsive: true
    }
  });

  // =========================
  // 📡 MONITOR DATA
  // =========================
  db.ref("sensor").on("value", function(snapshot) {
    var data = snapshot.val();

    if (data) {
      // tampilkan angka
      document.getElementById("suhu").innerText = data.suhu + " °C";
      document.getElementById("hum").innerText = data.kelembapan + " %";
      document.getElementById("volt").innerText = data.tegangan + " V";

      // waktu
      var waktu = new Date().toLocaleTimeString();

      // batasi 10 data
      if (labels.length > 10) {
        labels.shift();
        suhuData.shift();
        humData.shift();
        voltData.shift();
      }

      // push data ke grafik
      labels.push(waktu);
      suhuData.push(data.suhu);
      humData.push(data.kelembapan);
      voltData.push(data.tegangan);

      chart.update();
    }
  });

  // =========================
  // 🔘 KONTROL POMPA
  // =========================
  function pompaON() {
    db.ref("kontrol").set({ pompa: 1 });
  }

  function pompaOFF() {
    db.ref("kontrol").set({ pompa: 0 });
  }
</script>

</body>
</html>
